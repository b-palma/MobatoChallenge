name: Tests

on:
  workflow_dispatch:

jobs:
  web:
    name: Web — Playwright (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium
        run: npx playwright install chromium --with-deps

      - name: Rodar testes
        run: npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  mobile:
    name: Mobile — Maestro (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Preparar env mobile
        run: cp mobile/.env.example mobile/.env

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 600
          script: bash mobile/scripts/ci-run.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-reports
          path: mobile/reports/junit.xml
          retention-days: 7
